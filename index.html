<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #eaf0f0;
        --orb-1: #1aabcc;
        --orb-2: #38d9a9;
        --orb-3: #c0f0e8;
        --text-dark: #101c1f;
        --text-mid: #3d5c5f;
        --text-light: #7a9ea1;
        --glass-border: rgba(255, 255, 255, 0.55);
        --glass-bg: rgba(255, 255, 255, 0.18);
      }

      html,
      body {
        height: 100%;
        width: 100%;
        overflow: hidden;
      }

      body {
        background: var(--bg);
        font-family: "Syne", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      /* ── Ambient background ── */
      .bg-layer {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
      }

      .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0;
        animation: orbFloat 8s ease-in-out infinite;
      }

      .orb-1 {
        width: 680px;
        height: 680px;
        background: radial-gradient(
          circle,
          #1aabcc 0%,
          #38d9a9 45%,
          transparent 72%
        );
        top: -180px;
        left: 50%;
        transform: translateX(-50%);
        animation-name: orbFloat1;
        animation-duration: 10s;
        animation-delay: 0s;
      }

      .orb-2 {
        width: 420px;
        height: 420px;
        background: radial-gradient(
          circle,
          #38d9a9 0%,
          #c0f0e8 50%,
          transparent 70%
        );
        bottom: -80px;
        left: 20%;
        animation-name: orbFloat2;
        animation-duration: 12s;
        animation-delay: 0.3s;
      }

      .orb-3 {
        width: 320px;
        height: 320px;
        background: radial-gradient(
          circle,
          #1aabcc 0%,
          #c0f0e8 60%,
          transparent 80%
        );
        top: 30%;
        right: 8%;
        animation-name: orbFloat3;
        animation-duration: 14s;
        animation-delay: 0.6s;
      }

      @keyframes orbFloat1 {
        0% {
          opacity: 0;
          transform: translateX(-50%) translateY(0px);
        }
        10% {
          opacity: 0.75;
        }
        50% {
          opacity: 0.75;
          transform: translateX(-50%) translateY(18px);
        }
        100% {
          opacity: 0.75;
          transform: translateX(-50%) translateY(0px);
        }
      }
      @keyframes orbFloat2 {
        0% {
          opacity: 0;
          transform: translateY(0px);
        }
        10% {
          opacity: 0.55;
        }
        50% {
          opacity: 0.55;
          transform: translateY(-14px);
        }
        100% {
          opacity: 0.55;
          transform: translateY(0px);
        }
      }
      @keyframes orbFloat3 {
        0% {
          opacity: 0;
          transform: translateY(0px);
        }
        10% {
          opacity: 0.4;
        }
        50% {
          opacity: 0.4;
          transform: translateY(20px);
        }
        100% {
          opacity: 0.4;
          transform: translateY(0px);
        }
      }

      /* ── Glass disc ── */
      .disc {
        position: fixed;
        width: min(900px, 100vw);
        height: min(900px, 100vw);
        top: 50%;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        background: radial-gradient(
          ellipse at 50% 30%,
          rgba(255, 255, 255, 0.38) 0%,
          rgba(255, 255, 255, 0.08) 70%
        );
        border: 1px solid var(--glass-border);
        backdrop-filter: blur(2px);
        -webkit-backdrop-filter: blur(2px);
        z-index: 1;
        opacity: 0;
        animation: fadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) 0.4s forwards;
      }

      /* ── Main card ── */
      .card {
        position: relative;
        z-index: 2;
        text-align: center;
        max-width: 560px;
        padding: 0 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
      }

      /* Status pill */
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        background: rgba(255, 255, 255, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.8);
        border-radius: 100px;
        padding: 6px 16px;
        font-family: "DM Mono", monospace;
        font-size: 11px;
        letter-spacing: 0.12em;
        color: var(--text-mid);
        text-transform: uppercase;
        margin-bottom: 36px;
        opacity: 0;
        animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.7s forwards;
        backdrop-filter: blur(8px);
      }

      .pill-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--orb-1);
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.5;
          transform: scale(0.85);
        }
      }

      /* Headline */
      h1 {
        font-size: clamp(54px, 9vw, 88px);
        font-weight: 800;
        letter-spacing: -0.03em;
        line-height: 1;
        color: var(--text-dark);
        margin-bottom: 20px;
        opacity: 0;
        animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.9s forwards;
      }

      h1 span {
        background: linear-gradient(
          135deg,
          #0e8a9e 0%,
          #1aabcc 50%,
          #38d9a9 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* Subheading */
      .sub {
        font-family: "DM Mono", monospace;
        font-size: 13px;
        letter-spacing: 0.04em;
        color: var(--text-light);
        margin-bottom: 52px;
        opacity: 0;
        animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 1.1s forwards;
      }

      /* Code snippet */
      .code-block {
        margin-top: 20px;
        background: rgba(26, 23, 20, 0.06);
        border: 1px solid rgba(26, 23, 20, 0.1);
        border-radius: 12px;
        padding: 14px 22px;
        font-family: "DM Mono", monospace;
        font-size: 13px;
        color: var(--text-mid);
        margin-bottom: 52px;
        display: flex;
        align-items: center;
        gap: 12px;
        opacity: 0;
        animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 1.25s forwards;
      }

      .code-comment {
        color: var(--text-light);
        font-style: italic;
      }
      .code-key {
        color: #0e8a9e;
      }
      .code-val {
        color: #1a9e6e;
      }
      .cursor-blink {
        display: inline-block;
        width: 2px;
        height: 14px;
        background: #1aabcc;
        border-radius: 2px;
        animation: blink 1.1s step-end infinite;
        vertical-align: middle;
        margin-left: 2px;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }

      /* Divider */
      .divider {
        width: 1px;
        height: 40px;
        background: linear-gradient(
          to bottom,
          transparent,
          rgba(26, 23, 20, 0.2),
          transparent
        );
        margin-bottom: 28px;
        opacity: 0;
        animation: fadeUp 0.6s ease 1.4s forwards;
      }

      /* Social text */
      .social-label {
        font-size: 13.5px;
        color: var(--text-mid);
        margin-bottom: 20px;
        letter-spacing: 0.01em;
        opacity: 0;
        animation: fadeUp 0.7s ease 1.5s forwards;
      }

      /* Social icons */
      .socials {
        display: flex;
        gap: 10px;
        opacity: 0;
        animation: fadeUp 0.7s ease 1.65s forwards;
      }

      .social-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.8);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        text-decoration: none;
        color: var(--text-mid);
        transition:
          background 0.25s,
          transform 0.25s,
          box-shadow 0.25s;
        backdrop-filter: blur(6px);
      }

      .social-btn:hover {
        background: rgba(26, 171, 204, 0.15);
        border-color: rgba(26, 171, 204, 0.45);
        transform: translateY(-3px);
        box-shadow: 0 8px 24px rgba(26, 171, 204, 0.2);
        color: #0e8a9e;
      }

      .social-btn svg {
        width: 16px;
        height: 16px;
        fill: currentColor;
      }

      /* Animations */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Noise texture overlay */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        background-size: 200px;
        pointer-events: none;
        z-index: 100;
        opacity: 0.5;
      }
    </style>
  </head>
  <body>
    <!-- Ambient orbs -->
    <div class="bg-layer">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>

    <!-- Glass disc -->
    <div class="disc"></div>

    <div class="card">

  </body>
